<!DOCTYPE html>
<html lang="en">
  <head>  
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagonalization Of Matrix</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <script src="./math.js" type="text/javascript"></script>
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <div id="topic" onclick="window.open('https://1ofx9.github.io/Diagonalisation-of-matrix/')">
        Diagonalization Of Matrix
      </div>

      <div class="github-links">
        <div id="logotext" onclick="window.open('https://github.com/1ofx9/Diagonalisation-of-matrix')">
          Source Code
        </div>
        <img
          id="gitlogo"
          alt="gitlogo"
          src="./assets/github.svg"
          onclick="window.open('https://github.com/1ofx9/Diagonalisation-of-matrix')"
        />
      </div>
    </header>

    <main class="app-container">
      <!-- Left Section: Selection and Matrix Inputs -->
      <div class="matrix-panel">
        <div class="mat-sel">
          <button type="button" id="twoxtwo" onclick="two()">2x2</button>
          <button type="button" id="threexthree" onclick="three()">3x3</button>
        </div>

        <!-- 2x2 Input Area -->
        <div id="mat-2x2-box" class="matrix-input-container">
          <div id="input-matrix-text-2x2" class="input-matrix-text">Enter Matrix:</div>
          <div id="input-box-bg-2x2" class="matrix-bg">
            <table>
              <tr>
                <td><input id="twor1c1" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="twor1c2" type="text" inputmode="numeric" value="0" /></td>
              </tr>
              <tr>
                <td><input id="twor2c1" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="twor2c2" type="text" inputmode="numeric" value="0" /></td>
              </tr>
            </table>
            <button id="cal2" class="calc-btn" type="button" onclick="calculate2()">Calculate</button>
          </div>
        </div>

        <!-- 3x3 Input Area -->
        <div id="mat-3x3-box" class="matrix-input-container hidden">
          <div id="input-matrix-text-3x3" class="input-matrix-text">Enter Matrix:</div>
          <div id="input-box-bg-3x3" class="matrix-bg">
            <table>
              <tr>
                <td><input id="threer1c1" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer1c2" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer1c3" type="text" inputmode="numeric" value="0" /></td>
              </tr>
              <tr>
                <td><input id="threer2c1" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer2c2" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer2c3" type="text" inputmode="numeric" value="0" /></td>
              </tr>
              <tr>
                <td><input id="threer3c1" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer3c2" type="text" inputmode="numeric" value="0" /></td>
                <td><input id="threer3c3" type="text" inputmode="numeric" value="0" /></td>
              </tr>
            </table>
            <button id="cal3" class="calc-btn" type="button" onclick="calculate3()">Calculate</button>
          </div>
        </div>
      </div>

      <!-- Right Section: Output Area -->
      <div class="output-panel">
        <div id="output-text">Output:</div>
        <textarea
          wrap="soft"
          name="Output"
          id="textarea"
          disabled
          placeholder="Calculation results will appear here..."
        ></textarea>
      </div>
    </main>
  </body>
</html>
